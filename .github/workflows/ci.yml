name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: python -m pip install --upgrade pip ruff mypy
      - name: Ruff lint
        run: ruff check .
      - name: Mypy (progressive, core modules)
        run: mypy config.py markdown_parser.py search_engine.py
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --upgrade pip markdown pygments networkx pillow pytest
      - name: Run pytest
        run: pytest -q
